<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров - Инкомос</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/catalog.css">
</head>
<body>
    <!-- Header (тот же) -->
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <a href="index.html"><strong>ИНКОМОС</strong></a>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="Поиск..." id="searchInput">
                    <button class="search-btn">🔍</button>
                </div>
                <div class="cart-widget" onclick="location.href='cart.html'">
                    <span>🛒</span>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
            <nav class="main-nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html" class="active">Каталог</a>
                <a href="brands.html">Бренды</a>
                <a href="delivery.html">Доставка</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="breadcrumb">
            <a href="index.html">Главная</a> / <span>Каталог</span>
        </div>

        <div class="catalog-layout">
            <!-- Filters Sidebar -->
            <aside class="filters-sidebar">
                <div class="filters-header">
                    <h3>Фильтры</h3>
                    <button class="reset-filters" onclick="resetFilters()">Сбросить</button>
                </div>

                <!-- Price Filter -->
                <div class="filter-group">
                    <h4>Цена, ₽</h4>
                    <div class="price-range">
                        <input type="number" id="priceFrom" placeholder="от" min="0">
                        <input type="number" id="priceTo" placeholder="до" min="0">
                    </div>
                </div>

                <!-- Brands Filter -->
                <div class="filter-group">
                    <h4>Производитель</h4>
                    <div id="brandsList" class="checkbox-list">
                        <!-- Заполняется JS -->
                    </div>
                </div>

                <!-- Category Filter -->
                <div class="filter-group">
                    <h4>Категория</h4>
                    <div id="categoryList" class="checkbox-list">
                        <!-- Заполняется JS -->
                    </div>
                </div>

                <!-- Availability -->
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="inStock">
                        <span>Только в наличии</span>
                    </label>
                </div>
            </aside>

            <!-- Products Area -->
            <div class="catalog-content">
                <div class="catalog-header">
                    <h1 id="pageTitle">Все товары</h1>
                    <div class="catalog-controls">
                        <select id="sortBy">
                            <option value="popular">По популярности</option>
                            <option value="price-asc">Сначала дешёвые</option>
                            <option value="price-desc">Сначала дорогие</option>
                            <option value="name">По названию</option>
                        </select>
                        <div class="view-toggle">
                            <button class="active" data-view="grid">⊞</button>
                            <button data-view="list">☰</button>
                        </div>
                    </div>
                </div>

                <div class="products-count" id="productsCount">Найдено товаров: 0</div>

                <div class="products-grid" id="productsGrid">
                    <!-- Заполняется JS -->
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Заполняется JS -->
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Инкомос. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/catalog.js"></script>
</body>
</html>
