<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Инкомос</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo"><a href="index.html"><strong>ИНКОМОС</strong></a></div>
            </div>
            <nav class="main-nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="cart.html" class="active">Корзина</a>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top:30px;">
        <h1 style="margin-bottom:30px;">Корзина</h1>
        
        <div id="cart-empty" class="hidden" style="text-align:center; padding:50px;">
            <h2>Корзина пуста</h2>
            <a href="catalog.html" class="btn-primary" style="display:inline-block; margin-top:20px;">Перейти в каталог</a>
        </div>

        <div id="cart-full" class="hidden">
            <div class="cart-layout">
                <div class="cart-items" id="cart-items">
                    <!-- Товары -->
                </div>
                <div class="cart-summary">
                    <h3>Итого</h3>
                    <div class="summary-row">
                        <span>Товаров:</span>
                        <span id="total-qty">0 шт.</span>
                    </div>
                    <div class="summary-row total">
                        <span>Сумма:</span>
                        <span id="total-price">0 ₽</span>
                    </div>
                    <a href="checkout.html" class="btn-primary full-width" style="margin-top:20px;">Оформить заказ</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
